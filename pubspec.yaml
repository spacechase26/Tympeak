name: tympeak
description: Offline productivity app — Tasks, Habits, Timer, Notes. 100% local.
publish_to: 'none'
version: 1.0.1+2
homepage: https://github.com/spacechase26/Tympeak
repository: https://github.com/spacechase26/Tympeak.git

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  uuid: ^4.4.0
  share_plus: ^9.0.0
  file_picker: ^8.0.7
  confetti: ^0.7.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  flutter_timezone: ^5.0.0
  flutter_markdown: ^0.6.18

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - icon_source.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon_foreground.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A1A"
  adaptive_icon_foreground: "icon_foreground.png"
